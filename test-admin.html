<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>树洞后台</title>
    <style>
        body{font-family:system-ui;padding:20px;background:#1a1a2e;color:white}
        .card{background:white;color:#333;border-radius:16px;padding:20px;margin-bottom:15px}
        button{background:#2c7e6b;color:white;padding:8px 16px;border:none;border-radius:8px;cursor:pointer;margin:5px}
        .pending{background:#f39c12;color:white;padding:2px 10px;border-radius:20px;display:inline-block;font-size:12px}
        input{padding:8px;border-radius:8px;border:none;margin:5px}
        .reject{background:#c0392b}
        .auto-refresh{font-size:12px;color:#aaa;margin-left:10px}
    </style>
</head>
<body>

<h1>🔐 树洞后台 <span class="auto-refresh" id="refreshStatus">🟢 自动刷新中 (5秒)</span></h1>

<div id="step1">
    <p>密码: <input type="password" id="myPassword"> <button id="loginBtn">登录</button></p>
</div>

<div id="step2" style="display:none">
    <div style="display:flex; gap:10px; margin-bottom:20px; align-items:center">
        <button id="pendingBtn">⏳ 待审核</button>
        <button id="approvedBtn">✅ 已批准</button>
        <button id="manualRefreshBtn">🔄 手动刷新</button>
        <span id="newMsgHint" style="color:#f39c12; font-size:14px"></span>
    </div>
    <div id="messageList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    (function(){
        const SUPABASE_URL = 'https://anocweisburxwajijubg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_6ow5oP9QjwBg7d1haNFm7Q_POntmHMC';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const loginBtn = document.getElementById('loginBtn');
        const passwordInput = document.getElementById('myPassword');
        const pendingBtn = document.getElementById('pendingBtn');
        const approvedBtn = document.getElementById('approvedBtn');
        const manualRefreshBtn = document.getElementById('manualRefreshBtn');
        const messageList = document.getElementById('messageList');
        const newMsgHint = document.getElementById('newMsgHint');
        const refreshStatus = document.getElementById('refreshStatus');
        
        let currentView = 'pending';
        let lastMessageCount = 0;
        let autoRefreshInterval = null;
        
        loginBtn.onclick = function() {
            var pwd = passwordInput.value;
            if (pwd === 'treehole2024') {
                step1.style.display = 'none';
                step2.style.display = 'block';
                startAutoRefresh();
                loadPendingMessages();
            } else {
                alert('密码错误！');
            }
        };
        
        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(function() {
                if (currentView === 'pending') {
                    checkForNewMessages();
                }
            }, 5000); // 每5秒检查一次
        }
        
        async function checkForNewMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('id', { count: 'exact', head: false })
                .eq('approved', false);
            
            if (error) return;
            
            const currentCount = data ? data.length : 0;
            if (currentCount > lastMessageCount) {
                newMsgHint.innerHTML = '✨ 有新的待审核留言！';
                refreshStatus.innerHTML = '🟡 检测到新留言';
                setTimeout(function() {
                    newMsgHint.innerHTML = '';
                    refreshStatus.innerHTML = '🟢 自动刷新中 (5秒)';
                }, 3000);
                loadPendingMessages(); // 自动刷新列表
            }
            lastMessageCount = currentCount;
        }
        
        async function loadPendingMessages() {
            currentView = 'pending';
            messageList.innerHTML = '加载中...';
            
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .eq('approved', false)
                .order('created_at', { ascending: false });
            
            if (error) {
                messageList.innerHTML = '错误: ' + error.message;
                return;
            }
            
            lastMessageCount = data ? data.length : 0;
            
            if (!data || data.length === 0) {
                messageList.innerHTML = '✨ 暂无待审核留言 ✨';
                return;
            }
            
            let html = '';
            for (let i = 0; i < data.length; i++) {
                var msg = data[i];
                var time = new Date(msg.created_at).toLocaleString();
                html += '<div class="card">';
                html += '<div><span class="pending">待审核</span> #' + msg.id + '</div>';
                html += '<div><strong>' + safe(msg.anonymous_name) + '</strong> 于 ' + time + '</div>';
                html += '<div style="margin:10px 0">' + safe(msg.content) + '</div>';
                html += '<button onclick="approveMsg(' + msg.id + ')">✅ 批准显示</button>';
                html += '<button onclick="rejectMsg(' + msg.id + ')" class="reject">❌ 拒绝删除</button>';
                html += '</div>';
            }
            messageList.innerHTML = html;
        }
        
        async function loadApprovedMessages() {
            currentView = 'approved';
            messageList.innerHTML = '加载中...';
            
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .eq('approved', true)
                .order('created_at', { ascending: false })
                .limit(50);
            
            if (error) {
                messageList.innerHTML = '错误: ' + error.message;
                return;
            }
            
            if (!data || data.length === 0) {
                messageList.innerHTML = '✨ 暂无已批准留言 ✨';
                return;
            }
            
            let html = '';
            for (let i = 0; i < data.length; i++) {
                var msg = data[i];
                var time = new Date(msg.created_at).toLocaleString();
                html += '<div class="card">';
                html += '<div><span class="approved" style="background:#27ae60;color:white;padding:2px 10px;border-radius:20px;display:inline-block;font-size:12px">已批准</span> #' + msg.id + '</div>';
                html += '<div><strong>' + safe(msg.anonymous_name) + '</strong> 于 ' + time + '</div>';
                html += '<div style="margin:10px 0">' + safe(msg.content) + '</div>';
                html += '</div>';
            }
            messageList.innerHTML = html;
        }
        
        async function approveMsg(id) {
            const { error } = await supabase.from('messages').update({ approved: true }).eq('id', id);
            if (error) {
                alert('批准失败: ' + error.message);
                return;
            }
            alert('✅ 已批准，刷新主页即可看到');
            loadPendingMessages();
        }
        
        async function rejectMsg(id) {
            if (!confirm('确定要永久删除这条留言吗？')) return;
            
            const { error } = await supabase.from('messages').delete().eq('id', id);
            if (error) {
                alert('删除失败: ' + error.message);
                return;
            }
            alert('❌ 已永久删除');
            loadPendingMessages();
        }
        
        function manualRefresh() {
            if (currentView === 'pending') {
                loadPendingMessages();
            } else {
                loadApprovedMessages();
            }
            newMsgHint.innerHTML = '🔄 已刷新';
            setTimeout(function() { newMsgHint.innerHTML = ''; }, 2000);
        }
        
        pendingBtn.onclick = function() { loadPendingMessages(); };
        approvedBtn.onclick = function() { loadApprovedMessages(); };
        manualRefreshBtn.onclick = function() { manualRefresh(); };
        
        function safe(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        window.approveMsg = approveMsg;
        window.rejectMsg = rejectMsg;
    })();
</script>

</body>
</html>
