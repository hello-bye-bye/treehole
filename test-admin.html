<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>树洞后台</title>
    <style>
        body{font-family:system-ui;padding:20px;background:#1a1a2e;color:white}
        .card{background:white;color:#333;border-radius:16px;padding:20px;margin-bottom:15px}
        button{background:#2c7e6b;color:white;padding:8px 16px;border:none;border-radius:8px;cursor:pointer;margin:5px}
        .pending{background:#f39c12;color:white;padding:2px 10px;border-radius:20px;display:inline-block;font-size:12px}
        input{padding:8px;border-radius:8px;border:none;margin:5px}
        .reject{background:#c0392b}
    </style>
</head>
<body>

<h1>🔐 树洞后台</h1>

<div id="step1">
    <p>密码: <input type="password" id="myPassword"> <button id="loginBtn">登录</button></p>
</div>

<div id="step2" style="display:none">
    <h2>📋 待审核留言</h2>
    <button id="refreshBtn">🔄 刷新</button>
    <div id="messageList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Supabase 配置
    const SUPABASE_URL = 'https://anocweisburxwajijubg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_6ow5oP9QjwBg7d1haNFm7Q_POntmHMC';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // 获取元素
    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const loginBtn = document.getElementById('loginBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const messageList = document.getElementById('messageList');
    const passwordInput = document.getElementById('myPassword');
    
    // 登录函数
    loginBtn.onclick = function() {
        var pwd = passwordInput.value;
        if (pwd === 'treehole2024') {
            step1.style.display = 'none';
            step2.style.display = 'block';
            loadMessages();
        } else {
            alert('密码错误！');
        }
    };
    
    // 加载待审核留言
    async function loadMessages() {
        messageList.innerHTML = '加载中...';
        
        const { data, error } = await supabase
            .from('messages')
            .select('*')
            .eq('approved', false)
            .order('created_at', { ascending: false });
        
        if (error) {
            messageList.innerHTML = '错误: ' + error.message;
            return;
        }
        
        if (!data || data.length === 0) {
            messageList.innerHTML = '✨ 暂无待审核留言 ✨';
            return;
        }
        
        let html = '';
        for (let i = 0; i < data.length; i++) {
            var msg = data[i];
            var time = new Date(msg.created_at).toLocaleString();
            html += '<div class="card">';
            html += '<div><span class="pending">待审核</span> #' + msg.id + '</div>';
            html += '<div><strong>' + safe(msg.anonymous_name) + '</strong> 于 ' + time + '</div>';
            html += '<div style="margin:10px 0">' + safe(msg.content) + '</div>';
            html += '<button onclick="approveMsg(' + msg.id + ')">✅ 批准显示</button>';
            html += '<button onclick="rejectMsg(' + msg.id + ')" class="reject">❌ 拒绝删除</button>';
            html += '</div>';
        }
        messageList.innerHTML = html;
    }
    
    // 批准留言
    async function approveMsg(id) {
        await supabase.from('messages').update({ approved: true }).eq('id', id);
        loadMessages();
        alert('已批准，刷新主页即可看到');
    }
    
    // 拒绝留言
    async function rejectMsg(id) {
        await supabase.from('messages').delete().eq('id', id);
        loadMessages();
        alert('已删除');
    }
    
    // 刷新按钮
    refreshBtn.onclick = function() {
        loadMessages();
    };
    
    // 安全转义
    function safe(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // 让全局函数可以被 onclick 调用
    window.approveMsg = approveMsg;
    window.rejectMsg = rejectMsg;
</script>

</body>
</html>
