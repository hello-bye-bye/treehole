<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>树洞后台</title>
    <style>
        body{font-family:system-ui;padding:20px;background:#1a1a2e;color:white}
        .card{background:white;color:#333;border-radius:16px;padding:20px;margin-bottom:15px}
        .reply-card{background:#f0f0f0;color:#333;border-radius:16px;padding:15px;margin-bottom:15px;margin-left:20px;border-left:4px solid #f39c12}
        button{background:#2c7e6b;color:white;padding:8px 16px;border:none;border-radius:8px;cursor:pointer;margin:5px}
        .pending{background:#f39c12;color:white;padding:2px 10px;border-radius:20px;display:inline-block;font-size:12px}
        .reply-badge{background:#3498db;color:white;padding:2px 10px;border-radius:20px;display:inline-block;font-size:12px;margin-left:10px}
        input{padding:8px;border-radius:8px;border:none;margin:5px}
        .reject{background:#c0392b}
        .auto-refresh{font-size:12px;color:#aaa;margin-left:10px}
    </style>
</head>
<body>

<h1>🔐 树洞后台 <span class="auto-refresh" id="refreshStatus">🟢 自动刷新中 (5秒)</span></h1>

<div id="step1">
    <p>密码: <input type="password" id="myPassword"> <button id="loginBtn">登录</button></p>
</div>

<div id="step2" style="display:none">
    <div style="display:flex; gap:10px; margin-bottom:20px; align-items:center">
        <button id="pendingBtn">⏳ 待审核 (<span id="pendingCount">0</span>)</button>
        <button id="approvedBtn">✅ 已批准</button>
        <button id="manualRefreshBtn">🔄 手动刷新</button>
        <span id="newMsgHint" style="color:#f39c12; font-size:14px"></span>
    </div>
    <div id="messageList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    (function(){
        const SUPABASE_URL = 'https://anocweisburxwajijubg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_6ow5oP9QjwBg7d1haNFm7Q_POntmHMC';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const loginBtn = document.getElementById('loginBtn');
        const passwordInput = document.getElementById('myPassword');
        const pendingBtn = document.getElementById('pendingBtn');
        const approvedBtn = document.getElementById('approvedBtn');
        const manualRefreshBtn = document.getElementById('manualRefreshBtn');
        const messageList = document.getElementById('messageList');
        const newMsgHint = document.getElementById('newMsgHint');
        const refreshStatus = document.getElementById('refreshStatus');
        const pendingCountSpan = document.getElementById('pendingCount');
        
        let currentView = 'pending';
        let autoRefreshInterval = null;
        
        loginBtn.onclick = function() {
            var pwd = passwordInput.value;
            if (pwd === 'treehole2024') {
                step1.style.display = 'none';
                step2.style.display = 'block';
                startAutoRefresh();
                loadPendingAll();
            } else {
                alert('密码错误！');
            }
        };
        
        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(function() {
                if (currentView === 'pending') {
                    loadPendingAll(true);
                }
            }, 5000);
        }
        
        async function loadPendingAll(silent) {
            if (!silent) messageList.innerHTML = '加载中...';
            
            const { data: messages, error: msgError } = await supabase
                .from('messages')
                .select('*')
                .eq('approved', false)
                .order('created_at', { ascending: false });
            
            if (msgError) {
                if (!silent) messageList.innerHTML = '错误: ' + msgError.message;
                return;
            }
            
            const { data: replies, error: repError } = await supabase
                .from('replies')
                .select('*')
                .eq('approved', false)
                .order('created_at', { ascending: false });
            
            if (repError) console.error('回复查询错误:', repError);
            
            const totalPending = (messages?.length || 0) + (replies?.length || 0);
            pendingCountSpan.innerText = totalPending;
            
            if (totalPending === 0) {
                messageList.innerHTML = '✨ 暂无待审核内容 ✨';
                return;
            }
            
            let html = '';
            
            if (messages && messages.length > 0) {
                for (let i = 0; i < messages.length; i++) {
                    var msg = messages[i];
                    var time = new Date(msg.created_at).toLocaleString();
                    html += '<div class="card" id="msg-' + msg.id + '">';
                    html += '<div><span class="pending">📝 待审核留言</span> #' + msg.id + '</div>';
                    html += '<div><strong>' + safe(msg.anonymous_name) + '</strong> 于 ' + time + '</div>';
                    html += '<div style="margin:10px 0">' + safe(msg.content) + '</div>';
                    html += '<button onclick="approveMessage(' + msg.id + ')">✅ 批准留言</button>';
                    html += '<button onclick="rejectMessage(' + msg.id + ')" class="reject">❌ 拒绝删除</button>';
                    html += '</div>';
                }
            }
            
            if (replies && replies.length > 0) {
                for (let i = 0; i < replies.length; i++) {
                    var rep = replies[i];
                    var time = new Date(rep.created_at).toLocaleString();
                    html += '<div class="reply-card" id="reply-' + rep.id + '">';
                    html += '<div><span class="pending">💬 待审核回复</span> <span class="reply-badge">针对留言 #' + rep.message_id + '</span></div>';
                    html += '<div><strong>' + safe(rep.anonymous_name) + '</strong> 于 ' + time + '</div>';
                    html += '<div style="margin:10px 0">' + safe(rep.content) + '</div>';
                    html += '<button onclick="approveReply(' + rep.id + ')">✅ 批准回复</button>';
                    html += '<button onclick="rejectReply(' + rep.id + ')" class="reject">❌ 拒绝删除</button>';
                    html += '</div>';
                }
            }
            
            messageList.innerHTML = html;
        }
        
        async function loadApprovedAll() {
            currentView = 'approved';
            messageList.innerHTML = '加载中...';
            
            const { data: messages } = await supabase
                .from('messages')
                .select('*')
                .eq('approved', true)
                .order('created_at', { ascending: false })
                .limit(50);
            
            const { data: replies } = await supabase
                .from('replies')
                .select('*')
                .eq('approved', true)
                .order('created_at', { ascending: false })
                .limit(50);
            
            let html = '';
            
            if (messages && messages.length > 0) {
                for (let msg of messages) {
                    html += '<div class="card">';
                    html += '<div><span class="approved" style="background:#27ae60;color:white;padding:2px 10px;border-radius:20px;display:inline-block;font-size:12px">✅ 已批准留言</span> #' + msg.id + '</div>';
                    html += '<div><strong>' + safe(msg.anonymous_name) + '</strong> 于 ' + new Date(msg.created_at).toLocaleString() + '</div>';
                    html += '<div style="margin:10px 0">' + safe(msg.content) + '</div>';
                    html += '</div>';
                }
            }
            
            if (replies && replies.length > 0) {
                for (let rep of replies) {
                    html += '<div class="reply-card">';
                    html += '<div><span class="approved" style="background:#27ae60;color:white;padding:2px 10px;border-radius:20px;display:inline-block;font-size:12px">✅ 已批准回复</span></div>';
                    html += '<div><strong>' + safe(rep.anonymous_name) + '</strong> 于 ' + new Date(rep.created_at).toLocaleString() + '</div>';
                    html += '<div style="margin:10px 0">' + safe(rep.content) + '</div>';
                    html += '</div>';
                }
            }
            
            if ((!messages || messages.length === 0) && (!replies || replies.length === 0)) {
                messageList.innerHTML = '✨ 暂无已批准内容 ✨';
            } else {
                messageList.innerHTML = html;
            }
        }
        
        async function approveMessage(id) {
            await supabase.from('messages').update({ approved: true }).eq('id', id);
            alert('✅ 留言已批准');
            loadPendingAll(); // 立即刷新列表
        }
        
        async function rejectMessage(id) {
            if (!confirm('确定永久删除这条留言吗？')) return;
            await supabase.from('messages').delete().eq('id', id);
            alert('❌ 已删除');
            loadPendingAll(); // 立即刷新列表，被删除的项会消失
        }
        
        async function approveReply(id) {
            await supabase.from('replies').update({ approved: true }).eq('id', id);
            alert('✅ 回复已批准');
            loadPendingAll(); // 立即刷新列表
        }
        
        async function rejectReply(id) {
            if (!confirm('确定永久删除这条回复吗？')) return;
            await supabase.from('replies').delete().eq('id', id);
            alert('❌ 已删除');
            loadPendingAll(); // 立即刷新列表，被删除的项会消失
        }
        
        function manualRefresh() {
            if (currentView === 'pending') {
                loadPendingAll();
            } else {
                loadApprovedAll();
            }
            newMsgHint.innerHTML = '🔄 已刷新';
            setTimeout(function() { newMsgHint.innerHTML = ''; }, 2000);
        }
        
        pendingBtn.onclick = function() { 
            currentView = 'pending';
            loadPendingAll();
        };
        approvedBtn.onclick = function() { 
            currentView = 'approved';
            loadApprovedAll();
        };
        manualRefreshBtn.onclick = manualRefresh;
        
        function safe(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        window.approveMessage = approveMessage;
        window.rejectMessage = rejectMessage;
        window.approveReply = approveReply;
        window.rejectReply = rejectReply;
    })();
</script>

</body>
</html>
