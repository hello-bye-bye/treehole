<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌳 共情树洞 · 匿名留言板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .status {
            padding: 10px 20px;
            background: #e0e7ff;
            text-align: center;
            font-size: 14px;
            color: #667eea;
        }
        .messages {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .message {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .message-name {
            color: #667eea;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .message-time {
            color: #999;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .message-content {
            color: #333;
            line-height: 1.5;
        }
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .fab:hover {
            transform: scale(1.1);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
        }
        .modal-content textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin: 15px 0;
            font-family: inherit;
        }
        .modal-content button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .cancel-btn {
            background: #ccc;
        }
        .footer {
            text-align: center;
            padding: 15px;
            background: #f0f0f0;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>💙 共情树洞</h1>
        <p>匿名倾诉 · 温暖回应 · 实时同步</p>
    </div>
    <div class="status" id="status">
        🟢 连接中...
    </div>
    <div class="messages" id="messages">
        <div style="text-align:center; padding:40px; color:#999;">✨ 加载留言中... ✨</div>
    </div>
    <div class="footer">
        Made with 💙 by respond.dfc.team
    </div>
</div>

<button class="fab" id="fabBtn">+</button>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>🌱 说出你的心事</h3>
        <textarea id="messageInput" placeholder="写下你的烦恼、秘密或鼓励..."></textarea>
        <button class="send-btn" id="sendBtn">💬 匿名倾诉</button>
        <button class="cancel-btn" id="cancelBtn">取消</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ========== 你的 Supabase 配置（已填好） ==========
    const SUPABASE_URL = 'https://anocweisburxwajijubg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_6ow5oP9QjwBg7d1haNFm7Q_POntmHMC';
    // ================================================
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // 生成匿名名字
    let userName = localStorage.getItem('treehole_name');
    if (!userName) {
        const names = ['🌙 月光旅人', '⭐ 星辰使者', '🍃 清风', '🌸 花瓣', '🕊️ 飞鸟', '💧 雨滴', '🍂 落叶', '🌿 青草'];
        userName = names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random() * 100);
        localStorage.setItem('treehole_name', userName);
    }
    
    // 加载留言
    async function loadMessages() {
        const { data, error } = await supabase
            .from('messages')
            .select('*')
            .order('created_at', { ascending: false });
        
        if (error) {
            console.error('加载失败:', error);
            document.getElementById('messages').innerHTML = '<div style="text-align:center; padding:40px; color:#999;">⚠️ 连接失败，请检查数据库配置</div>';
            document.getElementById('status').innerHTML = '🔴 连接失败';
            return;
        }
        
        if (!data || data.length === 0) {
            document.getElementById('messages').innerHTML = '<div style="text-align:center; padding:40px; color:#999;">✨ 第一个留言等你来写 ✨</div>';
            return;
        }
        
        const html = data.map(msg => `
            <div class="message">
                <div class="message-name">${escapeHtml(msg.anonymous_name)}</div>
                <div class="message-time">${formatTime(msg.created_at)}</div>
                <div class="message-content">${escapeHtml(msg.content)}</div>
            </div>
        `).join('');
        document.getElementById('messages').innerHTML = html;
        document.getElementById('status').innerHTML = '🟢 实时同步 · 树洞在线';
    }
    
    // 发送留言
    async function sendMessage(content) {
        if (!content.trim()) {
            alert('请写点心事~');
            return false;
        }
        if (content.length > 500) {
            alert('最多500字哦~');
            return false;
        }
        
        const { error } = await supabase
            .from('messages')
            .insert([{
                content: content.trim(),
                anonymous_name: userName,
                created_at: new Date().toISOString()
            }]);
        
        if (error) {
            alert('发送失败: ' + error.message);
            console.error(error);
            return false;
        }
        return true;
    }
    
    // 实时订阅
    function subscribe() {
        supabase
            .channel('messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
                loadMessages();
            })
            .subscribe();
    }
    
    function formatTime(iso) {
        if (!iso) return '刚刚';
        const date = new Date(iso);
        const now = new Date();
        const diff = Math.floor((now - date) / 60000);
        if (diff < 1) return '几秒前';
        if (diff < 60) return `${diff}分钟前`;
        if (diff < 1440) return `${Math.floor(diff / 60)}小时前`;
        return `${Math.floor(diff / 1440)}天前`;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // 模态框
    const modal = document.getElementById('modal');
    const fab = document.getElementById('fabBtn');
    const sendBtn = document.getElementById('sendBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const input = document.getElementById('messageInput');
    
    fab.onclick = () => {
        modal.style.display = 'flex';
        input.value = '';
        input.focus();
    };
    
    cancelBtn.onclick = () => {
        modal.style.display = 'none';
    };
    
    sendBtn.onclick = async () => {
        const success = await sendMessage(input.value);
        if (success) {
            modal.style.display = 'none';
            input.value = '';
            await loadMessages();
        }
    };
    
    window.onclick = (e) => {
        if (e.target === modal) modal.style.display = 'none';
    };
    
    // 启动
    loadMessages();
    subscribe();
</script>
</body>
</html>
