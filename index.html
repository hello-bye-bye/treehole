<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>💙 共情樹洞 · 心聲共鳴</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(145deg,#dceeff,#b2d8fa);font-family:system-ui;padding:20px;min-height:100vh;display:flex;justify-content:center;align-items:center}
        .treehole{max-width:750px;width:100%;background:rgba(255,255,255,0.95);border-radius:48px;box-shadow:0 30px 45px -20px rgba(0,0,0,0.4);overflow:hidden;position:relative}
        .tree-header{background:linear-gradient(135deg,#1e2f5e,#2b4b6e,#2c6e5c);padding:20px 24px;color:#f0fcff}
        .title-wrapper{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:12px}
        .tree-header h1{font-size:1.9rem;display:flex;align-items:center;gap:10px}
        .lang-switch{background:rgba(255,255,245,0.2);border:none;color:white;padding:6px 14px;border-radius:60px;font-weight:bold;cursor:pointer}
        .status-bar{background:#eaf4fc;padding:10px 24px;display:flex;justify-content:space-between;font-size:0.8rem;color:#1f4172}
        .live-tag{display:flex;gap:8px;align-items:center}
        .dot{width:10px;height:10px;background:#1fbf6e;border-radius:50%;animation:pulse 1.8s infinite}
        .messages-area{background:#f5fbfe;height:500px;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:18px}
        .message-card{background:white;border-radius:32px;padding:18px 20px;box-shadow:0 5px 14px rgba(40,60,90,0.08);border:1px solid rgba(112,176,210,0.3)}
        .message-card:hover{transform:translateY(-3px);border-color:#6bc6ff}
        .message-meta{display:flex;justify-content:space-between;font-size:0.7rem;color:#3f7e9c;margin-bottom:10px}
        .anonymous-name{background:#e1f0fe;padding:4px 14px;border-radius:40px}
        .message-text{font-size:1rem;line-height:1.48;color:#1d2e3f;margin:12px 0 14px 0;white-space:pre-wrap}
        .action-buttons{display:flex;justify-content:flex-end;gap:12px;margin-top:8px;border-top:1px solid #e2eff9;padding-top:12px}
        .empathy-btn,.reply-btn{background:linear-gradient(115deg,#eef6ff,#fff);border:1px solid #9ac2db;padding:6px 16px;border-radius:60px;font-size:0.75rem;font-weight:600;color:#2a6b8f;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:0.15s}
        .empathy-btn:disabled{opacity:0.5;cursor:not-allowed;background:#f0f0f0}
        .replies-area{margin-top:12px;padding-left:16px;border-left:3px solid #9ac2db}
        .reply-card{background:#f8fafc;border-radius:20px;padding:10px 14px;margin-top:8px;font-size:0.85rem}
        .reply-meta{display:flex;justify-content:space-between;font-size:0.65rem;color:#6b8faa;margin-bottom:5px}
        .fab-wrapper{position:fixed;bottom:30px;right:calc(50% - 375px + 30px);z-index:1000}
        @media (max-width:750px){.fab-wrapper{right:30px}}
        .floating-btn{background:linear-gradient(145deg,#2f6b7c,#1d4e62);width:64px;height:64px;border-radius:40px;border:none;color:white;font-size:2.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(0,32,64,0.3);transition:transform 0.2s}
        .floating-btn:hover{transform:scale(1.05)}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(28,45,65,0.7);backdrop-filter:blur(5px);justify-content:center;align-items:center;z-index:1001}
        .modal-card{background:white;max-width:500px;width:85%;border-radius:56px;padding:28px 24px 32px;text-align:center}
        .modal-card textarea{width:100%;border-radius:32px;border:2px solid #bcddff;padding:16px;margin:16px 0;resize:vertical;font-family:inherit}
        .modal-actions{display:flex;gap:12px;justify-content:center}
        .modal-actions button{padding:10px 20px;border-radius:40px;border:none;font-weight:bold;cursor:pointer}
        .submit-msg{background:#2c7e6b;color:white}
        .cancel-msg{background:#cfdfed;color:#2b5e7a}
        .footer-sig{text-align:center;padding:14px;font-size:0.7rem;color:#4c799b;background:#e1eff9}
        @keyframes pulse{0%{opacity:0.5;transform:scale(0.9)}100%{opacity:1;transform:scale(1.2)}}
        .live-badge{background:#2c7a5e;padding:4px 14px;border-radius:40px;color:white;font-weight:bold;font-size:0.75rem}
    </style>
</head>
<body>
<div class="treehole">
    <div class="tree-header">
        <div class="title-wrapper">
            <h1><span>💙🌿</span> <span id="titleText">共情樹洞 · 心聲共鳴</span> <span>🕊️</span></h1>
            <button class="lang-switch" id="langToggleBtn">🌐 English</button>
        </div>
        <div class="subhead" id="subheadText">聆聽彼此 · 身同感受 | 每一份心事都值得回應</div>
    </div>
    <div class="status-bar">
        <div class="live-tag"><span class="dot"></span><span id="liveText">實時共情 · 世界樹洞</span></div>
        <div class="live-badge" id="realtimeStatus">🟢 自動刷新中 (3秒)</div>
    </div>
    <div class="messages-area" id="messageList"><div style="text-align:center;padding:40px;">✨ 加載中... ✨</div></div>
    <div class="footer-sig">Made with 💙 by respond.dfc.team · 冷調共鳴 · 匿名守護</div>
</div>

<div class="fab-wrapper"><button class="floating-btn" id="openModalBtn">+</button></div>

<div id="messageModal" class="modal">
    <div class="modal-card">
        <h3 id="modalTitle">🌱 說出你的心事</h3>
        <textarea id="modalMessageInput" rows="3" placeholder="寫下你的煩惱..."></textarea>
        <div class="modal-actions">
            <button class="submit-msg" id="modalSendBtn">💬 匿名傾訴</button>
            <button class="cancel-msg" id="modalCancelBtn">取消</button>
        </div>
    </div>
</div>
<div id="replyModal" class="modal">
    <div class="modal-card">
        <h3 id="replyModalTitle">💬 回覆這條心事</h3>
        <textarea id="replyInput" rows="3" placeholder="寫下你的回應..."></textarea>
        <div class="modal-actions">
            <button class="submit-msg" id="replySendBtn">發送回覆</button>
            <button class="cancel-msg" id="replyCancelBtn">取消</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
    const SUPABASE_URL = 'https://anocweisburxwajijubg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_6ow5oP9QjwBg7d1haNFm7Q_POntmHMC';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // ========== 敏感词库（已修复，包含简体+繁体） ==========
    const BAD_WORDS = [
        '傻逼', '蠢货', '脑残', '弱智', '白痴', '废物', '去死', '操你', '尼玛', '贱人',
        'sb', 'fuck', 'shit', 'asshole', 'bitch', 'nmsl', 'cnm', 'tmd',
        '傻逼', '蠢貨', '腦殘', '白癡', '廢物', '去死', '操你', '尼瑪', '賤人',
        '優逼', '雞巴', '幹你', '靠北', '機掰', '哭爸', '恁娘', '塞林娘'
    ];
    function hasBadWord(t){
        if(!t) return false;
        let lower = t.toLowerCase();
        for(let bad of BAD_WORDS){
            if(lower.includes(bad.toLowerCase())) return true;
        }
        return false;
    }
    
    let lang = 'zh-tw';
    const txt = {
        'zh-cn': {
            title:'共情树洞 · 心声共鸣', subhead:'聆听彼此 · 身同感受 | 每一份心事都值得回应',
            live:'实时共情 · 世界树洞', modalTitle:'🌱 说出你的心事', send:'💬 匿名倾诉',
            cancel:'取消', empathy:'身同感受', reply:'💬 回复', replyTitle:'💬 回复这条心事',
            replySend:'发送回复', placeholder:'写下你的烦恼...', empty:'✨ 风铃摇曳，等待第一个心声 ✨',
            replyPlaceholder:'写下你的回应...', alreadyLiked:'你已经感受过这份心事了'
        },
        'zh-tw': {
            title:'共情樹洞 · 心聲共鳴', subhead:'聆聽彼此 · 身同感受 | 每一份心事都值得回應',
            live:'實時共情 · 世界樹洞', modalTitle:'🌱 說出你的心事', send:'💬 匿名傾訴',
            cancel:'取消', empathy:'身同感受', reply:'💬 回覆', replyTitle:'💬 回覆這條心事',
            replySend:'發送回覆', placeholder:'寫下你的煩惱...', empty:'✨ 風鈴搖曳，等待第一個心聲 ✨',
            replyPlaceholder:'寫下你的回應...', alreadyLiked:'你已經感受過這份心事了'
        },
        en: {
            title:'Empathy Treehole · Resonant Voices', subhead:'Listen & Relate | Every feeling matters',
            live:'Live Empathy · Global Treehole', modalTitle:'🌱 Whisper your heart', send:'💬 Anonymous Confide',
            cancel:'Cancel', empathy:'I feel you', reply:'💬 Reply', replyTitle:'💬 Reply to this',
            replySend:'Send Reply', placeholder:'Write your troubles...', empty:'✨ Waiting for first whisper ✨',
            replyPlaceholder:'Write your response...', alreadyLiked:'You have already felt this'
        }
    };
    
    function updateLang(){
        let t=txt[lang];
        document.getElementById('titleText').innerText=t.title;
        document.getElementById('subheadText').innerText=t.subhead;
        document.getElementById('liveText').innerText=t.live;
        document.getElementById('modalTitle').innerText=t.modalTitle;
        document.getElementById('modalSendBtn').innerText=t.send;
        document.getElementById('modalCancelBtn').innerText=t.cancel;
        document.getElementById('modalMessageInput').placeholder=t.placeholder;
        document.getElementById('replyModalTitle').innerText=t.replyTitle;
        document.getElementById('replySendBtn').innerText=t.replySend;
        document.getElementById('replyInput').placeholder=t.replyPlaceholder;
        document.getElementById('langToggleBtn').innerText=lang==='en'?'中文':(lang==='zh-cn'?'繁體中文':'English');
        loadMessages();
    }
    
    let userName=localStorage.getItem('treehole_name');
    if(!userName){
        const names=['💧冰露','❄️雪狐','🌊潮汐','🔷藍鳶','🍃清嵐','🌙銀月','💎星塵'];
        userName=names[Math.floor(Math.random()*names.length)]+Math.floor(Math.random()*999);
        localStorage.setItem('treehole_name',userName);
    }
    
    let currentReplyId=null;
    let lastMessageCount = 0;
    let likedMessages = JSON.parse(localStorage.getItem('liked_messages') || '[]');
    
    function saveLikedMessages(){
        localStorage.setItem('liked_messages', JSON.stringify(likedMessages));
    }
    
    async function loadMessages(){
        const{data:messages,error:msgErr}=await supabase.from('messages').select('*').order('created_at',{ascending:false}).limit(200);
        if(msgErr){console.error('留言加載錯誤:',msgErr);document.getElementById('realtimeStatus').innerHTML='🔴 連接異常';return;}
        const{data:replies,error:repErr}=await supabase.from('replies').select('*').order('created_at',{ascending:true});
        if(repErr)console.error('回覆加載錯誤:',repErr);
        
        const replyMap=new Map();
        if(replies) for(let r of replies){if(!replyMap.has(r.message_id))replyMap.set(r.message_id,[]);replyMap.get(r.message_id).push(r);}
        const container=document.getElementById('messageList');
        if(!messages||messages.length===0){container.innerHTML=`<div style="text-align:center;padding:40px;">${txt[lang].empty}</div>`;return;}
        
        let html='';
        for(let m of messages){
            let repliesHtml='';
            let repList=replyMap.get(m.id)||[];
            if(repList.length){
                repliesHtml='<div class="replies-area">';
                for(let r of repList) repliesHtml+=`<div class="reply-card"><div class="reply-meta"><span>${escapeHtml(r.anonymous_name)}</span><span>${timeAgo(r.created_at)}</span></div><div class="reply-text">${escapeHtml(r.content)}</div></div>`;
                repliesHtml+='</div>';
            }
            const hasLiked = likedMessages.includes(m.id);
            const disabledAttr = hasLiked ? 'disabled' : '';
            html+=`<div class="message-card"><div class="message-meta"><span class="anonymous-name">${escapeHtml(m.anonymous_name)}</span><span>${timeAgo(m.created_at)}</span></div><div class="message-text">${escapeHtml(m.content)}</div><div class="action-buttons"><button class="empathy-btn" data-id="${m.id}" data-count="${m.empathy_count||0}" ${disabledAttr}><span>💙</span> <span>${txt[lang].empathy}</span> <span class="empathy-count">${m.empathy_count||0}</span></button><button class="reply-btn" data-id="${m.id}"><span>💬</span> <span>${txt[lang].reply}</span></button></div>${repliesHtml}</div>`;
        }
        
        if(messages.length !== lastMessageCount && lastMessageCount !== 0){
            const statusDiv = document.getElementById('realtimeStatus');
            statusDiv.innerHTML = '🟢 有新消息！';
            setTimeout(() => { if(statusDiv) statusDiv.innerHTML = '🟢 自動刷新中 (3秒)'; }, 2000);
        }
        lastMessageCount = messages.length;
        
        container.innerHTML=html;
        
        document.querySelectorAll('.empathy-btn').forEach(btn=>{
            const msgId = parseInt(btn.dataset.id);
            const hasLiked = likedMessages.includes(msgId);
            if(hasLiked){
                btn.disabled = true;
                btn.style.opacity = '0.5';
            }
            btn.onclick=async()=>{
                if(hasLiked){
                    alert(txt[lang].alreadyLiked);
                    return;
                }
                const id = btn.dataset.id;
                const cnt = parseInt(btn.dataset.count);
                likedMessages.push(parseInt(id));
                saveLikedMessages();
                btn.disabled = true;
                btn.style.opacity = '0.5';
                btn.querySelector('.empathy-count').innerText = cnt + 1;
                await supabase.from('messages').update({empathy_count: cnt + 1}).eq('id', id);
            };
        });
        
        document.querySelectorAll('.reply-btn').forEach(btn=>{btn.onclick=()=>{currentReplyId=btn.dataset.id;document.getElementById('replyInput').value='';document.getElementById('replyModal').style.display='flex';};});
    }
    
    async function sendMessage(content){
        if(!content.trim()){alert('請寫點心事~');return false;}
        if(content.length>400){alert('最多400字~');return false;}
        if(hasBadWord(content)){alert('🕊️ 請用善意傳遞溫暖');return false;}
        let{error}=await supabase.from('messages').insert([{content:content.trim(),anonymous_name:userName,created_at:new Date().toISOString(),empathy_count:0}]);
        if(error){alert('發送失敗:'+error.message);return false;}
        return true;
    }
    
    async function sendReply(messageId,content){
        if(!content.trim()){alert('請寫點回應~');return false;}
        if(content.length>300){alert('最多300字~');return false;}
        if(hasBadWord(content)){alert('🕊️ 請用善意傳遞溫暖');return false;}
        let{error}=await supabase.from('replies').insert([{message_id:messageId,content:content.trim(),anonymous_name:userName,created_at:new Date().toISOString()}]);
        if(error){alert('回覆失敗:'+error.message);return false;}
        return true;
    }
    
    function timeAgo(iso){
        if(!iso)return'剛剛';
        let d=new Date(iso),n=new Date(),diff=Math.floor((n-d)/60000);
        if(diff<1)return'幾秒前';
        if(diff<60)return diff+'分鐘前';
        if(diff<1440)return Math.floor(diff/60)+'小時前';
        return Math.floor(diff/1440)+'天前';
    }
    function escapeHtml(s){if(!s)return'';return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
    
    document.getElementById('openModalBtn').onclick=()=>{document.getElementById('messageModal').style.display='flex';document.getElementById('modalMessageInput').value='';};
    document.getElementById('modalCancelBtn').onclick=()=>{document.getElementById('messageModal').style.display='none';};
    document.getElementById('modalSendBtn').onclick=async()=>{let inp=document.getElementById('modalMessageInput');if(await sendMessage(inp.value)){document.getElementById('messageModal').style.display='none';inp.value='';loadMessages();}};
    document.getElementById('replyCancelBtn').onclick=()=>{document.getElementById('replyModal').style.display='none';};
    document.getElementById('replySendBtn').onclick=async()=>{let inp=document.getElementById('replyInput');if(await sendReply(currentReplyId,inp.value)){document.getElementById('replyModal').style.display='none';inp.value='';loadMessages();}};
    window.onclick=(e)=>{if(e.target===document.getElementById('messageModal'))document.getElementById('messageModal').style.display='none';if(e.target===document.getElementById('replyModal'))document.getElementById('replyModal').style.display='none';};
    
    document.getElementById('langToggleBtn').onclick=()=>{
        if(lang === 'zh-cn') lang = 'zh-tw';
        else if(lang === 'zh-tw') lang = 'en';
        else lang = 'zh-cn';
        updateLang();
    };
    
    loadMessages();
    setInterval(() => { loadMessages(); }, 3000);
    updateLang();
})();
</script>
</body>
</html>
