<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌌 共情树洞 · 心灵回音壁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #dceeff 0%, #b2d8fa 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }

        /* 主容器 — 冰川玻璃质感 */
        .treehole {
            max-width: 750px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 30px 45px -20px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255,255,240,0.6) inset;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* 头部 - 冷调渐变 */
        .tree-header {
            background: linear-gradient(135deg, #1e2f5e, #2b4b6e, #2c6e5c);
            padding: 20px 24px;
            text-align: center;
            color: #f0fcff;
            border-bottom: 3px solid #7bc5e8;
        }

        .title-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
        }

        .tree-header h1 {
            font-size: 1.9rem;
            letter-spacing: 2px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lang-switch {
            background: rgba(255,255,245,0.2);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }
        .lang-switch:hover {
            background: rgba(255,255,245,0.4);
            transform: scale(0.96);
        }

        .subhead {
            font-size: 0.8rem;
            opacity: 0.85;
            margin-top: 8px;
        }

        /* 状态栏 */
        .status-bar {
            background: #eaf4fc;
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            border-bottom: 1px solid #bdd9f0;
            color: #1f4172;
        }
        .online-badge {
            background: #2c7a5e;
            padding: 4px 14px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 0.75rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .live-tag {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .dot {
            width: 10px;
            height: 10px;
            background-color: #1fbf6e;
            border-radius: 50%;
            box-shadow: 0 0 4px #0f9;
            animation: pulse 1.8s infinite;
        }

        /* 留言展示区 — 沉浸式看他人心事 */
        .messages-area {
            background: #f5fbfe;
            height: 500px;
            overflow-y: auto;
            padding: 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        /* 留言卡片 精致+互动 */
        .message-card {
            background: white;
            border-radius: 32px;
            padding: 18px 20px;
            box-shadow: 0 5px 14px rgba(40, 60, 90, 0.08);
            transition: all 0.2s ease;
            border: 1px solid rgba(112, 176, 210, 0.3);
            position: relative;
        }
        .message-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -12px rgba(33, 77, 111, 0.25);
            border-color: #6bc6ff;
        }

        .message-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #3f7e9c;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .anonymous-name {
            background: #e1f0fe;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #1d4d6b;
        }
        .message-text {
            font-size: 1rem;
            line-height: 1.48;
            color: #1d2e3f;
            margin: 12px 0 14px 0;
            white-space: pre-wrap;
            word-break: break-word;
            font-weight: 500;
        }
        /* 共情按钮区 */
        .empathy-section {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 16px;
            margin-top: 8px;
            border-top: 1px solid #e2eff9;
            padding-top: 12px;
        }
        .empathy-btn {
            background: linear-gradient(115deg, #eef6ff, #ffffff);
            border: 1px solid #9ac2db;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2a6b8f;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.15s linear;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .empathy-btn:active { transform: scale(0.94);}
        .empathy-btn:hover {
            background: #d9edff;
            border-color: #3f9ed6;
            color: #0f4c6b;
            box-shadow: 0 4px 10px rgba(64, 128, 160, 0.2);
        }
        .empathy-count {
            background: #d1e7fa;
            border-radius: 40px;
            padding: 2px 10px;
            font-weight: bold;
            font-size: 0.75rem;
            color: #1e5a7a;
        }
        .feel-icon {
            font-size: 1.1rem;
        }

        /* 右下角 + 悬浮按钮 (发布新问题) */
        .fab-wrapper {
            position: sticky;
            bottom: 24px;
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
            padding: 0 20px 20px 20px;
        }
        .floating-btn {
            background: linear-gradient(145deg, #2f6b7c, #1d4e62);
            width: 64px;
            height: 64px;
            border-radius: 40px;
            box-shadow: 0 12px 20px rgba(0, 32, 64, 0.3);
            border: none;
            color: white;
            font-size: 2.4rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            z-index: 10;
        }
        .floating-btn:hover {
            transform: scale(1.05);
            background: #217a6e;
            box-shadow: 0 10px 22px #1b4e5e;
        }

        /* 输入弹窗 Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(28, 45, 65, 0.7);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: #fefefe;
            max-width: 500px;
            width: 85%;
            border-radius: 56px;
            padding: 28px 24px 32px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid #cae3f2;
        }
        .modal-card h3 {
            font-size: 1.6rem;
            margin-bottom: 12px;
            color: #1c5570;
        }
        .modal-card textarea {
            width: 100%;
            border-radius: 32px;
            border: 2px solid #bcddff;
            padding: 16px;
            font-size: 1rem;
            margin: 16px 0;
            resize: vertical;
            font-family: inherit;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .modal-actions button {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .submit-msg {
            background: #2c7e6b;
            color: white;
        }
        .cancel-msg {
            background: #cfdfed;
            color: #2b5e7a;
        }

        /* 底部签名 */
        .footer-sig {
            text-align: center;
            padding: 14px 12px 16px;
            font-size: 0.7rem;
            color: #4c799b;
            background: #e1eff9;
            border-top: 1px solid #bedaf2;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        /* 滚动条 */
        .messages-area::-webkit-scrollbar { width: 6px; }
        .messages-area::-webkit-scrollbar-track { background: #d4e6f5; border-radius: 10px; }
        .messages-area::-webkit-scrollbar-thumb { background: #5187ab; border-radius: 10px; }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }
        @media (max-width: 550px) {
            .tree-header h1 { font-size: 1.4rem; }
            .messages-area { height: 420px; }
        }
    </style>
</head>
<body>

<div class="treehole" id="appRoot">
    <div class="tree-header">
        <div class="title-wrapper">
            <h1><span>💙🌿</span> <span data-i18n="title">共情树洞 · 心声共鸣</span> <span>🕊️</span></h1>
            <button class="lang-switch" id="langToggleBtn">🌐 English / 中文</button>
        </div>
        <div class="subhead" data-i18n="subhead">聆听彼此 · 身同感受 | 每一份心事都值得回应</div>
    </div>
    <div class="status-bar">
        <div class="live-tag"><span class="dot"></span><span data-i18n="live">实时共情 · 世界树洞</span></div>
        <div class="online-badge" id="onlineCountDisplay">👥 加载中...</div>
    </div>

    <!-- 留言区 — 一进去就看到别人的问题 -->
    <div class="messages-area" id="messageList">
        <div class="empty-state" style="text-align:center; padding:40px;">✨ 风铃摇曳，等待第一个心声 ✨</div>
    </div>

    <!-- 右下角加号按钮 -->
    <div class="fab-wrapper">
        <button class="floating-btn" id="openModalBtn">+</button>
    </div>

    <!-- 模态框 (写自己的问题) -->
    <div id="messageModal" class="modal">
        <div class="modal-card">
            <h3 data-i18n="modalTitle">🌱 说出你的心事</h3>
            <textarea id="modalMessageInput" rows="3" placeholder="写下你的烦恼、秘密或鼓励... (最长400字)"></textarea>
            <div class="modal-actions">
                <button class="submit-msg" id="modalSendBtn" data-i18n="send">💬 匿名倾诉</button>
                <button class="cancel-msg" id="modalCancelBtn" data-i18n="cancel">取消</button>
            </div>
        </div>
    </div>

    <div class="footer-sig">
        Made with 💙 by respond.dfc.team · 冷调共鸣 · 匿名守护
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ------------------------------
    // 共情树洞：身同感受按钮 + 中英对照 + 敏感词过滤 + 冷色调生动设计
    // 实时数据库: Supabase (保留原有云端数据)
    // ------------------------------
    const SUPABASE_URL = 'https://kdxljofrgxqylsnduyno.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkeGxqb2ZyZ3hxeWxzbmR1eW5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQyMTE2MDAsImV4cCI6MjA1OTc4NzYwMH0.VcDqy27n2M6xYkd3O1C2yOB-3dY_yAfy6mZ2F4exdLM';
    
    // ---------- 敏感词库 (仅拦截极端脏话，不误伤正常词汇) ----------
    const BAD_WORDS = [
        '傻逼', '蠢货', '脑残', '弱智', '白痴', '废物', '垃圾人', '去死', '操你', '尼玛', '妈逼', '贱人', 
        'sb', 'fuck', 'shit', 'asshole', 'bitch', 'dumb', 'idiot', 'stfu', 'nmsl', 'cnm', 'tmd', 'wtf', 
        '杀你', '炸了', '死全家', '强奸', '毒品', '色情', '卖淫', '操你妈', '神经病', '智障', '婊子'
    ];
    
    function containsBadWord(text) {
        if (!text) return false;
        let lower = text.toLowerCase();
        // 只检测完整脏词，不拆字检测，避免误伤
        for (let bad of BAD_WORDS) {
            if (lower.includes(bad.toLowerCase())) {
                return true;
            }
        }
        return false;
    }

    // 国际化资源
    const i18n = {
        zh: {
            title: "共情树洞 · 心声共鸣",
            subhead: "聆听彼此 · 身同感受 | 每一份心事都值得回应",
            live: "实时共情 · 世界树洞",
            modalTitle: "🌱 说出你的心事",
            send: "💬 匿名倾诉",
            cancel: "取消",
            empathyLabel: "身同感受",
            placeholder: "写下你的烦恼、秘密或鼓励... (最长400字)",
            emptyMsg: "✨ 风铃摇曳，等待第一个心声 ✨",
            sendFail: "发送失败，请重试 (敏感词或网络)",
            badWordAlert: "🕊️ 树洞守护: 请用善意传递温暖，当前内容含敏感词",
            empathyCount: (n) => `${n} 人感同身受`
        },
        en: {
            title: "Empathy Treehole · Resonant Voices",
            subhead: "Listen & Relate | Every feeling matters",
            live: "Live Empathy · Global Heartbeat",
            modalTitle: "🌱 Whisper your heart",
            send: "💬 Anonymous confide",
            cancel: "Cancel",
            empathyLabel: "I feel you",
            placeholder: "Write your troubles, secrets, or encouragement... (Max 400 chars)",
            emptyMsg: "✨ Wind chimes swaying, waiting for the first whisper ✨",
            sendFail: "Failed to send, please retry (sensitive words or network)",
            badWordAlert: "🕊️ Kindness only: your message contains sensitive words",
            empathyCount: (n) => `${n} feel the same`
        }
    };
    let currentLang = 'zh';
    function t(key, param = null) {
        let val = i18n[currentLang][key];
        if (typeof val === 'function') return param !== null ? val(param) : val;
        return val || key;
    }
    function updateUItexts() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (key && i18n[currentLang][key]) el.innerText = i18n[currentLang][key];
        });
        const modalTextarea = document.getElementById('modalMessageInput');
        if (modalTextarea) modalTextarea.placeholder = t('placeholder');
        const emptyDiv = document.querySelector('#messageList .empty-state');
        if (emptyDiv && (!window.currentMessages || window.currentMessages.length === 0)) {
            emptyDiv.innerText = t('emptyMsg');
        }
        document.querySelectorAll('.empathy-btn span:last-child').forEach(span => {
            if (span.innerText.includes('身同感受') || span.innerText.includes('I feel you')) {
                span.innerText = t('empathyLabel');
            }
        });
        document.querySelectorAll('.empathy-count').forEach(cntSpan => {
            let val = cntSpan.getAttribute('data-count');
            if (val) cntSpan.innerText = t('empathyCount', parseInt(val));
        });
    }

    let supabaseClient = null;
    let currentChannel = null;
    let currentUserTag = localStorage.getItem('treehole_user_name');
    if (!currentUserTag) {
        const names = ['💧 冰露', '❄️ 雪狐', '🌊 潮汐', '🔷 蓝鸢', '🍃 清岚', '🪶 羽落', '🌙 银月', '💎 星尘'];
        currentUserTag = names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random() * 999);
        localStorage.setItem('treehole_user_name', currentUserTag);
    }
    let presenceChannel = null;

    async function initSupabase() {
        const { createClient } = window.supabase;
        supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        await fetchMessages();
        subscribeRealtime();
        initPresence();
    }

    async function fetchMessages() {
        if (!supabaseClient) return [];
        const { data, error } = await supabaseClient
            .from('treehole_messages')
            .select('id, content, anonymous_name, created_at, empathy_count')
            .order('created_at', { ascending: false })
            .limit(200);
        if (error) {
            console.error("获取留言失败", error);
            return [];
        }
        const processed = (data || []).map(m => ({ ...m, empathy_count: m.empathy_count || 0 }));
        window.currentMessages = processed;
        renderMessages(processed);
        return processed;
    }

    async function updateEmpathy(messageId, currentCount) {
        if (!supabaseClient) return;
        const newCount = (currentCount || 0) + 1;
        const { error } = await supabaseClient
            .from('treehole_messages')
            .update({ empathy_count: newCount })
            .eq('id', messageId);
        if (!error) {
            if (window.currentMessages) {
                const idx = window.currentMessages.findIndex(m => m.id === messageId);
                if (idx !== -1) window.currentMessages[idx].empathy_count = newCount;
                renderMessages(window.currentMessages);
            }
        } else {
            console.warn("点赞失败", error);
            alert("点赞失败，请重试");
        }
    }

    function renderMessages(messages) {
        const container = document.getElementById('messageList');
        if (!container) return;
        if (!messages || messages.length === 0) {
            container.innerHTML = `<div class="empty-state" style="text-align:center; padding:40px;">${t('emptyMsg')}</div>`;
            return;
        }
        const sorted = [...messages].sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
        const html = sorted.map(msg => {
            const timeAgo = formatTime(msg.created_at);
            const empathyVal = msg.empathy_count || 0;
            const empathyText = t('empathyCount', empathyVal);
            return `
                <div class="message-card" data-id="${msg.id}">
                    <div class="message-meta">
                        <span class="anonymous-name">${escapeHtml(msg.anonymous_name || '匿名旅人')}</span>
                        <span>${timeAgo}</span>
                    </div>
                    <div class="message-text">${escapeHtml(msg.content)}</div>
                    <div class="empathy-section">
                        <button class="empathy-btn" data-id="${msg.id}" data-count="${empathyVal}">
                            <span class="feel-icon">💙</span> 
                            <span>${t('empathyLabel')}</span>
                            <span class="empathy-count" data-count="${empathyVal}">${empathyText}</span>
                        </button>
                    </div>
                </div>
            `;
        }).join('');
        container.innerHTML = html;
        // 绑定共情按钮事件
        document.querySelectorAll('.empathy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const msgId = btn.getAttribute('data-id');
                const currentCnt = parseInt(btn.getAttribute('data-count') || '0');
                updateEmpathy(msgId, currentCnt);
            });
        });
        container.scrollTop = 0;
    }

    function formatTime(iso) {
        if (!iso) return '刚刚';
        const date = new Date(iso);
        const now = new Date();
        const diff = Math.floor((now - date) / 60000);
        if (diff < 1) return '几秒前';
        if (diff < 60) return `${diff}分钟前`;
        if (diff < 1440) return `${Math.floor(diff / 60)}小时前`;
        return `${Math.floor(diff / 1440)}天前`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    async function sendNewMessage(content) {
        if (!content || content.trim() === '') { 
            alert(t('sendFail')); 
            return false; 
        }
        if (content.length > 400) { 
            alert('最多400字~ 精简心声'); 
            return false; 
        }
        if (containsBadWord(content)) { 
            alert(t('badWordAlert')); 
            return false; 
        }
        if (!supabaseClient) { 
            alert('连接中，请稍后再试'); 
            return false; 
        }
        
        const newMsg = {
            content: content.trim(),
            anonymous_name: currentUserTag,
            created_at: new Date().toISOString(),
            empathy_count: 0
        };
        
        try {
            const { error } = await supabaseClient.from('treehole_messages').insert([newMsg]);
            if (error) {
                console.error("发送错误详情:", error);
                alert(t('sendFail') + "\n错误信息: " + error.message);
                return false;
            }
            return true;
        } catch (err) {
            console.error("发送异常:", err);
            alert(t('sendFail') + "\n" + err.message);
            return false;
        }
    }

    function subscribeRealtime() {
        if (!supabaseClient) return;
        if (currentChannel) supabaseClient.removeChannel(currentChannel);
        const channel = supabaseClient.channel('public:treehole_messages');
        channel.on('postgres_changes', { event: '*', schema: 'public', table: 'treehole_messages' }, () => {
            fetchMessages();
        }).subscribe();
        currentChannel = channel;
    }

    async function initPresence() {
        if (!supabaseClient) return;
        if (presenceChannel) await presenceChannel.unsubscribe();
        const chan = supabaseClient.channel('treehole_presence_v2');
        chan.on('presence', { event: 'sync' }, () => {
            const state = chan.presenceState();
            const count = Object.keys(state).length;
            const onlineSpan = document.getElementById('onlineCountDisplay');
            if (onlineSpan) onlineSpan.innerHTML = `👥 ${count} 共情在线`;
        });
        await chan.subscribe(async (status) => {
            if (status === 'SUBSCRIBED') await chan.track({ user: currentUserTag });
        });
        presenceChannel = chan;
    }

    // 模态框逻辑
    const modal = document.getElementById('messageModal');
    const openBtn = document.getElementById('openModalBtn');
    const modalSend = document.getElementById('modalSendBtn');
    const modalCancel = document.getElementById('modalCancelBtn');
    const modalInput = document.getElementById('modalMessageInput');
    openBtn.onclick = () => { modal.style.display = 'flex'; modalInput.value = ''; modalInput.focus(); };
    modalCancel.onclick = () => { modal.style.display = 'none'; };
    modalSend.onclick = async () => {
        const msg = modalInput.value.trim();
        if (!msg) { alert('请写点心事再发送~'); return; }
        const success = await sendNewMessage(msg);
        if (success) {
            modal.style.display = 'none';
            modalInput.value = '';
            await fetchMessages();
        }
    };
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    // 语言切换
    document.getElementById('langToggleBtn').addEventListener('click', () => {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        updateUItexts();
        if (window.currentMessages) renderMessages(window.currentMessages);
    });

    // 启动
    initSupabase();
</script>
</body>
</html>
