<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>树洞数据库测试</title>
</head>
<body>
    <h1>🔍 树洞数据库连接测试</h1>
    <div id="result" style="font-family: monospace; white-space: pre-wrap; background: #f0f0f0; padding: 20px; margin-top: 20px;">测试中...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (async function() {
            const resultDiv = document.getElementById('result');
            
            // 你的配置
            const SUPABASE_URL = 'https://anocweisburxwajijubg.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_6ow5oP9QjwBg7d1haNFm7Q_POntmHMC';
            
            resultDiv.innerText = '🔌 正在连接 Supabase...\nURL: ' + SUPABASE_URL + '\n\n';
            
            try {
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                
                resultDiv.innerText += '📡 尝试查询 messages 表...\n';
                
                const { data, error } = await supabase
                    .from('messages')
                    .select('*')
                    .limit(3);
                
                if (error) {
                    resultDiv.innerText += '\n❌ 查询失败！\n';
                    resultDiv.innerText += '错误代码: ' + (error.code || '无') + '\n';
                    resultDiv.innerText += '错误信息: ' + error.message + '\n';
                    resultDiv.innerText += '详细信息: ' + JSON.stringify(error, null, 2);
                } else {
                    resultDiv.innerText += '\n✅ 连接成功！\n';
                    resultDiv.innerText += '📊 当前留言数量: ' + (data ? data.length : 0) + '\n';
                    resultDiv.innerText += '📝 数据: ' + JSON.stringify(data, null, 2);
                }
            } catch (err) {
                resultDiv.innerText += '\n💥 程序异常: ' + err.message;
            }
        })();
    </script>
</body>
</html>
