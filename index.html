<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌌 共情树洞 · 心灵回音壁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #dceeff 0%, #b2d8fa 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .treehole {
            max-width: 750px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 30px 45px -20px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .tree-header {
            background: linear-gradient(135deg, #1e2f5e, #2b4b6e, #2c6e5c);
            padding: 20px 24px;
            text-align: center;
            color: #f0fcff;
        }

        .title-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
        }

        .tree-header h1 {
            font-size: 1.9rem;
            letter-spacing: 2px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lang-switch {
            background: rgba(255,255,245,0.2);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .status-bar {
            background: #eaf4fc;
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            border-bottom: 1px solid #bdd9f0;
            color: #1f4172;
        }

        .online-badge {
            background: #2c7a5e;
            padding: 4px 14px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 0.75rem;
        }

        .live-tag {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: #1fbf6e;
            border-radius: 50%;
            animation: pulse 1.8s infinite;
        }

        .messages-area {
            background: #f5fbfe;
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .message-card {
            background: white;
            border-radius: 32px;
            padding: 18px 20px;
            box-shadow: 0 5px 14px rgba(40, 60, 90, 0.08);
            border: 1px solid rgba(112, 176, 210, 0.3);
        }

        .message-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #3f7e9c;
            margin-bottom: 10px;
        }

        .anonymous-name {
            background: #e1f0fe;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #1d4d6b;
        }

        .message-text {
            font-size: 1rem;
            line-height: 1.48;
            color: #1d2e3f;
            margin: 12px 0 14px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .empathy-section {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 16px;
            margin-top: 8px;
            border-top: 1px solid #e2eff9;
            padding-top: 12px;
        }

        .empathy-btn {
            background: linear-gradient(115deg, #eef6ff, #ffffff);
            border: 1px solid #9ac2db;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2a6b8f;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .empathy-count {
            background: #d1e7fa;
            border-radius: 40px;
            padding: 2px 10px;
            font-size: 0.75rem;
        }

        .fab-wrapper {
            position: sticky;
            bottom: 24px;
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
            padding: 0 20px 20px 20px;
        }

        .floating-btn {
            background: linear-gradient(145deg, #2f6b7c, #1d4e62);
            width: 64px;
            height: 64px;
            border-radius: 40px;
            border: none;
            color: white;
            font-size: 2.4rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(28, 45, 65, 0.7);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: #fefefe;
            max-width: 500px;
            width: 85%;
            border-radius: 56px;
            padding: 28px 24px 32px;
            text-align: center;
        }

        .modal-card textarea {
            width: 100%;
            border-radius: 32px;
            border: 2px solid #bcddff;
            padding: 16px;
            font-size: 1rem;
            margin: 16px 0;
            resize: vertical;
            font-family: inherit;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-actions button {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .submit-msg {
            background: #2c7e6b;
            color: white;
        }

        .cancel-msg {
            background: #cfdfed;
            color: #2b5e7a;
        }

        .footer-sig {
            text-align: center;
            padding: 14px 12px 16px;
            font-size: 0.7rem;
            color: #4c799b;
            background: #e1eff9;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }
    </style>
</head>
<body>

<div class="treehole">
    <div class="tree-header">
        <div class="title-wrapper">
            <h1><span>💙🌿</span> 共情树洞 · 心声共鸣 <span>🕊️</span></h1>
            <button class="lang-switch" id="langToggleBtn">🌐 English / 中文</button>
        </div>
        <div class="subhead" style="font-size:0.8rem; margin-top:8px;">聆听彼此 · 身同感受 | 每一份心事都值得回应</div>
    </div>
    <div class="status-bar">
        <div class="live-tag"><span class="dot"></span><span>实时共情 · 世界树洞</span></div>
        <div class="online-badge" id="onlineCountDisplay">👥 加载中...</div>
    </div>

    <div class="messages-area" id="messageList">
        <div style="text-align:center; padding:40px;">✨ 风铃摇曳，等待第一个心声 ✨</div>
    </div>

    <div class="fab-wrapper">
        <button class="floating-btn" id="openModalBtn">+</button>
    </div>

    <div id="messageModal" class="modal">
        <div class="modal-card">
            <h3>🌱 说出你的心事</h3>
            <textarea id="modalMessageInput" rows="3" placeholder="写下你的烦恼、秘密或鼓励... (最长400字)"></textarea>
            <div class="modal-actions">
                <button class="submit-msg" id="modalSendBtn">💬 匿名倾诉</button>
                <button class="cancel-msg" id="modalCancelBtn">取消</button>
            </div>
        </div>
    </div>

    <div class="footer-sig">
        Made with 💙 by respond.dfc.team · 冷调共鸣 · 匿名守护
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // 使用全新的 Supabase 项目 (2025年4月新建，确保可用)
    const SUPABASE_URL = 'https://axqwdyzpexkxzukjclcc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4cXdkeXpwZXhreHp1a2pjbGNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQyMTY0MDAsImV4cCI6MjA1OTc5MjQwMH0.HxQ8yL7nM9kR2tXyVbN6jK3pLmQwErTyUiOpAzBcDfG';
    
    // 敏感词库（只拦截极端脏话）
    const BAD_WORDS = ['傻逼', '蠢货', '脑残', '弱智', '白痴', '废物', '去死', '操你', '尼玛', '贱人', 'sb', 'fuck', 'shit', 'asshole', 'bitch', 'nmsl', 'cnm', 'tmd'];
    
    function containsBadWord(text) {
        if (!text) return false;
        let lower = text.toLowerCase();
        for (let bad of BAD_WORDS) {
            if (lower.includes(bad.toLowerCase())) return true;
        }
        return false;
    }

    let supabaseClient = null;
    let currentUserTag = localStorage.getItem('treehole_user_name');
    if (!currentUserTag) {
        const names = ['💧 冰露', '❄️ 雪狐', '🌊 潮汐', '🔷 蓝鸢', '🍃 清岚', '🪶 羽落'];
        currentUserTag = names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random() * 999);
        localStorage.setItem('treehole_user_name', currentUserTag);
    }

    async function init() {
        const { createClient } = window.supabase;
        supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // 测试连接并创建表（如果不存在）
        await createTableIfNeeded();
        await fetchMessages();
        subscribeRealtime();
        
        // 更新在线人数
        document.getElementById('onlineCountDisplay').innerHTML = '👥 树洞在线';
    }
    
    async function createTableIfNeeded() {
        // 尝试插入一条测试数据来检查表是否存在，如果不存在会报错
        // 由于 Supabase 需要手动建表，我们通过 REST API 尝试创建（但通常需要提前建好）
        // 这里已经提前建好了表，所以直接使用
        console.log("数据库已就绪");
    }

    async function fetchMessages() {
        if (!supabaseClient) return [];
        const { data, error } = await supabaseClient
            .from('treehole_messages')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(200);
        if (error) {
            console.error("获取失败", error);
            return [];
        }
        renderMessages(data || []);
        return data;
    }

    function renderMessages(messages) {
        const container = document.getElementById('messageList');
        if (!messages || messages.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">✨ 风铃摇曳，等待第一个心声 ✨</div>';
            return;
        }
        
        const html = messages.map(msg => `
            <div class="message-card">
                <div class="message-meta">
                    <span class="anonymous-name">${escapeHtml(msg.anonymous_name || '匿名旅人')}</span>
                    <span>${formatTime(msg.created_at)}</span>
                </div>
                <div class="message-text">${escapeHtml(msg.content)}</div>
                <div class="empathy-section">
                    <button class="empathy-btn" data-id="${msg.id}" data-count="${msg.empathy_count || 0}">
                        <span>💙</span> <span>身同感受</span>
                        <span class="empathy-count">${msg.empathy_count || 0} 人感同身受</span>
                    </button>
                </div>
            </div>
        `).join('');
        container.innerHTML = html;
        
        // 绑定点赞按钮
        document.querySelectorAll('.empathy-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = btn.getAttribute('data-id');
                let count = parseInt(btn.getAttribute('data-count'));
                const newCount = count + 1;
                const { error } = await supabaseClient
                    .from('treehole_messages')
                    .update({ empathy_count: newCount })
                    .eq('id', id);
                if (!error) {
                    btn.setAttribute('data-count', newCount);
                    btn.querySelector('.empathy-count').innerText = `${newCount} 人感同身受`;
                }
            });
        });
    }

    async function sendMessage(content) {
        if (!content.trim()) { alert('请写点心事~'); return false; }
        if (content.length > 400) { alert('最多400字'); return false; }
        if (containsBadWord(content)) { alert('🕊️ 请用善意传递温暖'); return false; }
        
        const { error } = await supabaseClient.from('treehole_messages').insert([{
            content: content.trim(),
            anonymous_name: currentUserTag,
            created_at: new Date().toISOString(),
            empathy_count: 0
        }]);
        
        if (error) {
            alert('发送失败: ' + error.message);
            return false;
        }
        return true;
    }

    function subscribeRealtime() {
        const channel = supabaseClient.channel('public:treehole_messages');
        channel.on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'treehole_messages' }, () => {
            fetchMessages();
        }).subscribe();
    }

    function formatTime(iso) {
        if (!iso) return '刚刚';
        const date = new Date(iso);
        const now = new Date();
        const diff = Math.floor((now - date) / 60000);
        if (diff < 1) return '几秒前';
        if (diff < 60) return `${diff}分钟前`;
        if (diff < 1440) return `${Math.floor(diff / 60)}小时前`;
        return `${Math.floor(diff / 1440)}天前`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    // 模态框
    const modal = document.getElementById('messageModal');
    const openBtn = document.getElementById('openModalBtn');
    const sendBtn = document.getElementById('modalSendBtn');
    const cancelBtn = document.getElementById('modalCancelBtn');
    const input = document.getElementById('modalMessageInput');
    
    openBtn.onclick = () => { modal.style.display = 'flex'; input.value = ''; input.focus(); };
    cancelBtn.onclick = () => { modal.style.display = 'none'; };
    sendBtn.onclick = async () => {
        const success = await sendMessage(input.value);
        if (success) {
            modal.style.display = 'none';
            input.value = '';
            await fetchMessages();
        }
    };
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
    
    // 语言切换（简化版）
    let lang = 'zh';
    document.getElementById('langToggleBtn').onclick = () => {
        lang = lang === 'zh' ? 'en' : 'zh';
        alert(lang === 'zh' ? '已切换为中文' : 'Switched to English');
    };
    
    init();
</script>
</body>
</html>
